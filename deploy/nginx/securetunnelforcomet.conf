server {
    listen 80;
    server_name securetunnelforcomet.xyz www.securetunnelforcomet.xyz;
    return 301 https://securetunnelforcomet.xyz$request_uri;
}

server {
    listen 443 ssl;
    server_name securetunnelforcomet.xyz www.securetunnelforcomet.xyz;

    ssl_certificate     /etc/letsencrypt/live/securetunnelforcomet.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/securetunnelforcomet.xyz/privkey.pem;

    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Dashboard — admin web UI
    location = /dashboard { return 301 /dashboard/; }
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # VLESS WebSocket tunnel
    location /tunnel2026 {
        proxy_pass http://127.0.0.1:10000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Active-probe defence — anything else gets a real website
    location / {
        proxy_pass https://www.wikipedia.org;
        proxy_ssl_server_name on;
        proxy_set_header Host www.wikipedia.org;
        proxy_set_header Accept-Encoding "";
        proxy_connect_timeout 10s;
    }
}
